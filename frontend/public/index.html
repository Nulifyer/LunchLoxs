<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 { text-align: center; margin-bottom: 1.5rem; }

    /* Login */
    .login-section { max-width: 360px; margin: 0 auto; }
    .login-section h2 { text-align: center; margin-bottom: 1rem; }
    .login-section p { text-align: center; font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.25rem; }
    .field input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .login-btn:hover { background: #c73650; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error { color: #e94560; text-align: center; font-size: 0.85rem; margin-top: 0.75rem; }

    /* App */
    .app-header { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .app-header h1 { margin-bottom: 0; }
    .logout-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover { border-color: #e94560; color: #e94560; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    .add-form button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .add-form button:hover { background: #c73650; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-bottom: 1px solid #222;
    }
    .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
    .todo-item input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; }
    .todo-item span { flex: 1; }
    .todo-item button {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .status { text-align: center; font-size: 0.85rem; color: #666; margin-top: 1rem; }

    /* Sync badge */
    .sync-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .sync-badge.connecting { background: #f0a500; color: #000; }
    .sync-badge.disconnected { background: #e94560; color: #fff; }
    .sync-badge.connected { display: none; }
  </style>
</head>
<body>
  <!-- Login -->
  <section id="login-section" class="login-section" hidden>
    <h2>Todo App</h2>
    <p>End-to-end encrypted. Your data never leaves your devices unencrypted.</p>
    <form id="login-form">
      <div class="field">
        <label for="username-input">Username</label>
        <input type="text" id="username-input" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="passphrase-input">Passphrase</label>
        <input type="password" id="passphrase-input" required autocomplete="current-password" />
      </div>
      <button type="submit" id="login-btn" class="login-btn">Login / Sign Up</button>
      <p id="login-error" class="login-error" hidden></p>
    </form>
  </section>

  <!-- App -->
  <section id="app-section" hidden>
    <div class="app-header">
      <h1>Todos</h1>
      <span id="sync-badge" class="sync-badge" hidden></span>
      <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
    <form class="add-form" id="add-form">
      <input type="text" id="todo-input" placeholder="What needs to be done?" required />
      <button type="submit">Add</button>
    </form>
    <ul class="todo-list" id="todo-list"></ul>
    <p class="status" id="status"></p>
  </section>

  <script type="module" src="/index.js"></script>
</body>
</html>
