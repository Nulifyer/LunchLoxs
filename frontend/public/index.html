<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .add-form input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
    }
    .add-form button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .add-form button:hover { background: #c73650; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-bottom: 1px solid #222;
    }
    .todo-item.completed span { text-decoration: line-through; opacity: 0.5; }
    .todo-item input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; }
    .todo-item span { flex: 1; }
    .todo-item button {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .status { text-align: center; font-size: 0.85rem; color: #666; margin-top: 1rem; }
    .offline-badge {
      display: inline-block;
      background: #f0a500;
      color: #000;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Todos <span id="offline-badge" class="offline-badge" hidden>offline</span></h1>
  <form class="add-form" id="add-form">
    <input type="text" id="todo-input" placeholder="What needs to be done?" required />
    <button type="submit">Add</button>
  </form>
  <ul class="todo-list" id="todo-list"></ul>
  <p class="status" id="status"></p>

  <script type="module" src="/index.js"></script>
</body>
</html>
