services:
  traefik:
    image: traefik:3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.frontend.address=:5000"
      - "--entrypoints.frontend.http.tls=true"
      - "--entrypoints.backend.address=:8000"
      - "--entrypoints.backend.http.tls=true"
      - "--api.insecure=true"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8080:8080"
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localdb
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - app

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/localdb?sslmode=disable",
        "up",
      ]
    networks:
      - app

  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda13}
    environment:
      LLAMA_ARG_MODEL: ${LLAMA_MODEL_FILE:-/models/hf-cache/hub/models--unsloth--Qwen3-30B-A3B-GGUF/snapshots/d5b1d57bd0b504ac62ae6c725904e96ef228dc74/Qwen3-30B-A3B-Q4_K_M.gguf}
      LLAMA_ARG_ALIAS: ${LLAMA_MODEL_ALIAS:-qwen3-30b-a3b-q4_k_m}
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_CTX_SIZE: "32768"
      LLAMA_ARG_N_PREDICT: "16384"
      LLAMA_ARG_REASONING: ${LLAMA_REASONING:-off}
      LLAMA_ARG_N_PARALLEL: "1"
      LLAMA_ARG_FLASH_ATTN: "on"
      LLAMA_ARG_MMPROJ_AUTO: "false"
    volumes:
      - ./dev-data/models:/models
      - ./dev-data/models/hf-cache:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8081:8080"
    devices:
      - nvidia.com/gpu=all
    networks:
      - app

  browserless:
    image: ghcr.io/browserless/chromium
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TOKEN: dev-token
      CONCURRENT: "5"
      TIMEOUT: "30000"
    networks:
      - app

  backend:
    image: recipepwa-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/localdb?sslmode=disable
      PORT: "8000"
      FRONTEND_HOST: localhost:5000
      FRONTEND_HTTPS: "true"
      BIND_HOST: "0.0.0.0"
      LOG_LEVEL: debug
      LLM_ENDPOINT: http://llama:8080
      LLM_API_KEY: ""
      LLM_PROMPT_DIR: /app/prompts/url-import
      LLM_TIMEOUT: 20m
      LLM_DEFAULT_TEMPERATURE: "0.7"
      LLM_DEFAULT_TOP_P: "0.8"
      LLM_DEFAULT_MAX_TOKENS: "8192"
      LLM_PASS0_TEMPERATURE: "0.6"
      LLM_PASS0_TOP_P: "0.95"
      LLM_PASS0_MAX_TOKENS: "16384"
      LLM_PASS1_TEMPERATURE: "0.6"
      LLM_PASS1_TOP_P: "0.95"
      LLM_PASS1_MAX_TOKENS: "16384"
      LLM_PASS3_TEMPERATURE: "0.6"
      LLM_PASS3_TOP_P: "0.95"
      LLM_PASS3_MAX_TOKENS: "16384"
      BROWSERLESS_ENDPOINT: http://browserless:3000
      BROWSERLESS_TOKEN: dev-token
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`)"
      - "traefik.http.routers.backend.entrypoints=backend"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - app

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      BACKEND_HTTPS: ${BACKEND_HTTPS:-}
      LOG_LEVEL: debug
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=frontend"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=5000"
    networks:
      - app

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - app

networks:
  app:
