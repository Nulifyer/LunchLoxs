services:
  traefik:
    image: traefik:3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.frontend.address=:5000"
      - "--entrypoints.frontend.http.tls=true"
      - "--entrypoints.backend.address=:8000"
      - "--entrypoints.backend.http.tls=true"
      - "--api.insecure=true"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8080:8080"
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localdb
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - app

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/localdb?sslmode=disable",
        "up",
      ]
    networks:
      - app

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    command: ["--model", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8080", "--ctx-size", "8192", "--n-predict", "4096", "--threads", "8"]
    volumes:
      - ./dev-data/models/Qwen3-8B-Q4_K_M.gguf:/models/model.gguf:ro
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - app

  browserless:
    image: ghcr.io/browserless/chromium
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TOKEN: dev-token
      CONCURRENT: "5"
      TIMEOUT: "30000"
    networks:
      - app

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/localdb?sslmode=disable
      PORT: "8000"
      FRONTEND_HOST: localhost:5000
      FRONTEND_HTTPS: "true"
      BIND_HOST: "0.0.0.0"
      LLM_ENDPOINT: http://llama:8080
      BROWSERLESS_ENDPOINT: http://browserless:3000
      BROWSERLESS_TOKEN: dev-token
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`)"
      - "traefik.http.routers.backend.entrypoints=backend"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - app

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      BACKEND_HTTPS: ${BACKEND_HTTPS:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=frontend"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=5000"
    networks:
      - app

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - app

networks:
  app:
