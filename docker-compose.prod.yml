# Production docker-compose for LunchLoxs
#
# This example matches the Portainer stack used on the Ryzen deployment host.
# It assumes:
#   - Traefik already runs separately
#   - an external Docker network named "traefik" already exists
#   - the app stack manages postgres, migrations, backend, frontend, and optional local LLM services
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Ensure the external "traefik" network exists
#   3. Deploy the stack with docker compose or Portainer
#
# Optional services:
#   - Set ENABLE_LLM=1 to run local llama.cpp on the Ryzen host
#   - Set ENABLE_SCRAPE=1 to run Browserless for JS-rendered recipe pages

name: lunchloxs

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunchloxs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lunchloxs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lunchloxs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lunchloxs-net

  migrate:
    image: ghcr.io/nulifyer/lunchloxs-migrate:latest
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-database=postgres://${POSTGRES_USER:-lunchloxs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunchloxs}?sslmode=disable",
        "up",
      ]
    networks:
      - lunchloxs-net

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    restart: unless-stopped
    deploy:
      replicas: ${ENABLE_LLM:-0}
    environment:
      LLAMA_ARG_HF_REPO: ${LLM_MODEL:-Qwen/Qwen3-8B-GGUF:Q4_K_M}
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_CTX_SIZE: "32768"
      LLAMA_ARG_N_PREDICT: "16384"
      LLAMA_ARG_REASONING: "off"
      LLAMA_ARG_N_PARALLEL: "1"
      LLAMA_ARG_CACHE_TYPE_K: q4_0
      LLAMA_ARG_CACHE_TYPE_V: q4_0
      LLAMA_ARG_MMPROJ_AUTO: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - llm-models:/root/.cache/huggingface
    networks:
      - lunchloxs-net

  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    deploy:
      replicas: ${ENABLE_SCRAPE:-0}
    environment:
      TOKEN: ${BROWSERLESS_TOKEN:-}
      CONCURRENT: "10"
      TIMEOUT: "30000"
      HEALTH: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - lunchloxs-net

  backend:
    image: ghcr.io/nulifyer/lunchloxs-backend:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lunchloxs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunchloxs}?sslmode=disable
      PORT: "8000"
      BIND_HOST: "0.0.0.0"
      FRONTEND_HOST: ${DOMAIN:?Set DOMAIN in .env}
      FRONTEND_HTTPS: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: "json"
      RATE_LIMIT_PER_SEC: ${RATE_LIMIT_PER_SEC:-}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://llama:8080}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROMPT_DIR: ${LLM_PROMPT_DIR:-/app/prompts/url-import}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-20m}
      LLM_DEFAULT_TEMPERATURE: ${LLM_DEFAULT_TEMPERATURE:-0.7}
      LLM_DEFAULT_TOP_P: ${LLM_DEFAULT_TOP_P:-0.8}
      LLM_DEFAULT_MAX_TOKENS: ${LLM_DEFAULT_MAX_TOKENS:-8192}
      LLM_PASS0_TEMPERATURE: ${LLM_PASS0_TEMPERATURE:-0.6}
      LLM_PASS0_TOP_P: ${LLM_PASS0_TOP_P:-0.95}
      LLM_PASS0_MAX_TOKENS: ${LLM_PASS0_MAX_TOKENS:-16384}
      LLM_PASS1_TEMPERATURE: ${LLM_PASS1_TEMPERATURE:-0.6}
      LLM_PASS1_TOP_P: ${LLM_PASS1_TOP_P:-0.95}
      LLM_PASS1_MAX_TOKENS: ${LLM_PASS1_MAX_TOKENS:-16384}
      LLM_PASS2_TEMPERATURE: ${LLM_PASS2_TEMPERATURE:-0.7}
      LLM_PASS2_TOP_P: ${LLM_PASS2_TOP_P:-0.8}
      LLM_PASS2_MAX_TOKENS: ${LLM_PASS2_MAX_TOKENS:-8192}
      LLM_PASS3_TEMPERATURE: ${LLM_PASS3_TEMPERATURE:-0.6}
      LLM_PASS3_TOP_P: ${LLM_PASS3_TOP_P:-0.95}
      LLM_PASS3_MAX_TOKENS: ${LLM_PASS3_MAX_TOKENS:-16384}
      PROXY_TIMEOUT_SECS: ${PROXY_TIMEOUT_SECS:-15}
      BROWSERLESS_ENDPOINT: ${BROWSERLESS_ENDPOINT:-http://browserless:3000}
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN:-}
      BROWSERLESS_TIMEOUT_SECS: ${BROWSERLESS_TIMEOUT_SECS:-30}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lunchloxs-api-https.entrypoints=websecureEx"
      - "traefik.http.routers.lunchloxs-api-https.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.services.lunchloxs-api.loadbalancer.server.scheme=http"
      - "traefik.http.services.lunchloxs-api.loadbalancer.server.port=8000"
    networks:
      - lunchloxs-net
      - traefik

  frontend:
    image: ghcr.io/nulifyer/lunchloxs-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      BACKEND_HTTPS: ${BACKEND_HTTPS:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lunchloxs-http.entrypoints=webEx"
      - "traefik.http.routers.lunchloxs-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.lunchloxs-http.middlewares=https-redirect"
      - "traefik.http.routers.lunchloxs-https.entrypoints=websecureEx"
      - "traefik.http.routers.lunchloxs-https.rule=Host(`${DOMAIN}`)"
      - "traefik.http.services.lunchloxs-web.loadbalancer.server.scheme=http"
      - "traefik.http.services.lunchloxs-web.loadbalancer.server.port=5000"
    networks:
      - lunchloxs-net
      - traefik

volumes:
  pgdata:
  llm-models:

networks:
  lunchloxs-net:
  traefik:
    external: true
