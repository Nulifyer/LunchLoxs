# Production docker-compose for LunchLoxs
#
# Two deployment modes:
#
#   Same-origin (default):
#     Frontend and backend share a domain. Traefik routes /api and /ws to backend.
#     Set FRONTEND_HOST + FRONTEND_HTTPS in .env.
#
#   Cross-origin:
#     Frontend and backend on separate domains.
#     Also set BACKEND_HOST + BACKEND_HTTPS in .env.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Place TLS cert at ./certs/cert.pem and key at ./certs/key.pem
#   3. Place traefik-dynamic.yml at ./traefik/dynamic.yml
#   4. Run: docker compose -f docker-compose.prod.yml up -d
#
# Images are pulled from GHCR. To pin a version, replace :latest with a tag (e.g. :v0.1.0)
#
# Optional: Recipe URL Import with LLM enhancement
#   Enables "Import from URL" with AI-powered ingredient parsing and step image placement.
#   Requires the "scrape" profile and optionally the "llm" profile.
#
#   Without LLM (basic JSON-LD extraction only):
#     docker compose -f docker-compose.prod.yml --profile scrape up -d
#
#   With LLM (enhanced extraction via Qwen3-8B):
#     docker compose -f docker-compose.prod.yml --profile scrape --profile llm up -d
#     Set LLM_ENDPOINT=http://llama:8080 in .env
#
#   The recommended model is Qwen3-8B-Q4_K_M (~5GB, needs ~6GB RAM).
#   Build: docker build -t lunchloxs-llama docker/llama
#   Any OpenAI-compatible endpoint works (e.g. Ollama, vLLM, or a remote API).

services:
  traefik:
    image: traefik:3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:443"
      - "--entrypoints.web.http.tls=true"
      - "--entrypoints.web-insecure.address=:80"
      - "--entrypoints.web-insecure.http.redirections.entrypoint.to=web"
      - "--entrypoints.web-insecure.http.redirections.entrypoint.scheme=https"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs:ro
    networks:
      - app

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunchloxs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lunchloxs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lunchloxs}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  migrate:
    image: ghcr.io/nulifyer/lunchloxs-migrate:latest
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-database=postgres://${POSTGRES_USER:-lunchloxs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunchloxs}?sslmode=disable",
        "up",
      ]
    networks:
      - app

  llama:
    build:
      context: docker/llama
    restart: unless-stopped
    profiles: ["llm"]
    networks:
      - app

  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    profiles: ["scrape"]
    environment:
      TOKEN: ${BROWSERLESS_TOKEN:-}
      CONCURRENT: "10"
      TIMEOUT: "30000"
    networks:
      - app

  backend:
    image: ghcr.io/nulifyer/lunchloxs-backend:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lunchloxs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lunchloxs}?sslmode=disable
      PORT: "8000"
      FRONTEND_HOST: ${FRONTEND_HOST:?Set FRONTEND_HOST in .env}
      FRONTEND_HTTPS: ${FRONTEND_HTTPS:-}
      BIND_HOST: "0.0.0.0"
      LLM_ENDPOINT: ${LLM_ENDPOINT:-}
      BROWSERLESS_ENDPOINT: ${BROWSERLESS_ENDPOINT:-}
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${FRONTEND_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - app

  frontend:
    image: ghcr.io/nulifyer/lunchloxs-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-}
      BACKEND_HTTPS: ${BACKEND_HTTPS:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_HOST}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5000"
    networks:
      - app

volumes:
  pgdata:
  certs:

networks:
  app:
