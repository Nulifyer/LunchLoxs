name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path backend/migrations -database "postgres://postgres:postgres@localhost:5432/localdb?sslmode=disable" up
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/localdb?sslmode=disable
        run: go test ./... -v -timeout 120s

  frontend-unit:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: cd frontend && bun install --frozen-lockfile
      - name: Typecheck
        run: cd frontend && bunx tsc --noEmit
      - name: Build
        run: cd frontend && bun run build
      - name: Unit tests
        run: cd frontend && bun run test:unit --timeout 30000

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2
      - name: Migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path backend/migrations -database "postgres://postgres:postgres@localhost:5432/localdb?sslmode=disable" up
      - name: Install frontend deps
        run: cd frontend && bun install --frozen-lockfile
      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/localdb?sslmode=disable
        run: cd frontend && bun run test:integration --timeout 60000
