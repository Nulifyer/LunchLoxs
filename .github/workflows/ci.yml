name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: todos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run migrations on test DB
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path backend/migrations -database "postgres://postgres:postgres@localhost:5432/todos_test?sslmode=disable" up
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/todos_test?sslmode=disable
        run: go test ./... -v -timeout 120s

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: cd frontend && bun install --frozen-lockfile
      - name: Typecheck
        run: cd frontend && bun tsc --noEmit
      - name: Build
        run: cd frontend && bun run build
      - name: Test
        run: cd frontend && bun test
