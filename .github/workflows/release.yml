name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-backend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-backend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-frontend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push migrate
        uses: docker/build-push-action@v6
        with:
          context: backend/migrations
          file: backend/migrations/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-migrate:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-migrate:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/nulifyer/lunchloxs-migrate:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
